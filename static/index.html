<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>txt2sql - DB Check</title>
		<link rel="stylesheet" href="/static/styles.css" />
	</head>
	<body>
		<main>
			<h1>txt2sql</h1>
			
			<section id="generation-section">
				<h2>SQL Generation</h2>
				<div id="entity-display">Entity results will appear here.</div>
				<form id="entity-form">
					<label for="query-input">Natural Language Query</label>
					<textarea id="query-input" name="query" rows="6" placeholder="Type your query here"></textarea>
					<div>
						<button id="check-entity-btn" type="submit">Check Entity</button>
						<button id="generate-sql-btn" type="button">Generate SQL</button>
					</div>
				</form>
				<div id="sql-display" style="display: none;">
					<h3>Generated SQL:</h3>
					<pre id="sql-result"></pre>
				</div>
			</section>
			
			<section id="execution-section">
				<h2>Execute Query</h2>
				<form id="execute-form">
					<label for="sql-input">PostgreSQL Query</label>
					<textarea id="sql-input" name="sql" rows="6" placeholder="Enter your SQL query here"></textarea>
					<div>
						<button id="execute-btn" type="submit">Execute Query</button>
					</div>
				</form>
				<div id="results-display" style="display: none;">
					<h3>Query Results:</h3>
					<div id="results-container"></div>
				</div>
			</section>
			
		    <button id="check-db-btn" type="button">Check DB Connection</button>
			<div id="status"></div>
			<div id="token-logs" style="display: none;">
				<h3>Token Usage Log:</h3>
				<div id="token-display"></div>
			</div>
		</main>
		<script src="/static/scripts.js"></script>
	</body>
</html>
