<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>txt2sql - DB Check</title>
		<link rel="stylesheet" href="/static/styles.css" />
	</head>
	<body>
		<main>
			<h1>txt2sql</h1>
			
			<div class="layout-container">
				<section id="generation-section" class="column">
					<h2>SQL Generation</h2>
				<button id="refresh-schema-btn" type="button" style="align-self: flex-start; margin-bottom: 1rem;">Refresh Schema</button>
				<div id="refreshed-tables" style="display: none; margin-bottom: 1rem;">
					<h3>Available Tables:</h3>
					<div id="tables-list" style="background-color: #f0f4ff; border: 1px solid #e0e7ff; border-radius: 6px; padding: 0.75rem; max-height: 200px; overflow-y: auto;"></div>
				</div>
						<label for="query-input">Natural Language Query</label>
						<textarea id="query-input" name="query" rows="4" placeholder="Type your query here"></textarea>
						<div>
							<button id="check-entity-btn" type="submit">Check Entity</button>
							<button id="generate-sql-btn" type="button">Generate SQL</button>
						</div>
					</form>
					<div id="token-logs" style="display: none;">
						<h3>Token Usage:</h3>
						<div id="token-display"></div>
					</div>
				</section>
				
				<section id="execution-section" class="column">
					<h2>Execute Query</h2>
					<form id="execute-form">
						<label for="sql-input">PostgreSQL Query</label>
						<textarea id="sql-input" name="sql" rows="4" placeholder="Enter your SQL query here"></textarea>
						<div>
							<button id="execute-btn" type="submit">Execute Query</button>
						</div>
					</form>
					<div id="results-display" style="display: none;">
						<div id="results-container"></div>
					</div>
				</section>
			</div>
			
		    <button id="check-db-btn" type="button">Check DB Connection</button>
			<div id="status"></div>
		</main>
		<script src="/static/scripts.js"></script>
	</body>
</html>
