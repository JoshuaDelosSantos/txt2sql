<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>txt2sql - DB Check</title>
	</head>
	<body>
		<div id="entity-display">Entity results will appear here.</div>
		<form id="entity-form">
			<label for="query-input">Query</label>
			<textarea id="query-input" name="query" rows="6" cols="60" placeholder="Type your query here"></textarea>
			<br />
			<button id="check-entity-btn" type="submit">Check Entity</button>
			<button id="generate-sql-btn" type="button">Generate SQL</button>
		</form>
		<br />
		<div id="sql-display" style="display: none;">
			<h3>Generated SQL:</h3>
			<pre id="sql-result"></pre>
		</div>
		<br />
	    <button id="check-db-btn" type="button">Check DB Connection</button>
		<div id="status"></div>
		<br />
		<div id="token-logs" style="border: 1px solid #ccc; padding: 10px; margin-top: 20px; display: none;">
			<h3>Token Usage Log:</h3>
			<div id="token-display"></div>
		</div>
		<script src="/static/scripts.js"></script>
	</body>
</html>
